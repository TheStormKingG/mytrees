<svg viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .word {
        font-family: 'Arial Rounded MT Bold', 'Nunito', 'Varela Round', Arial, sans-serif;
        font-weight: 900;
        font-size: 96px;
        letter-spacing: -2px;
      }
    </style>
  </defs>
  <!-- Dark green stroke outline for depth -->
  <text
    class="word"
    x="210" y="96"
    text-anchor="middle"
    fill="none"
    stroke="#1a5c00"
    stroke-width="12"
    stroke-linejoin="round"
    paint-order="stroke"
  >MyTree</text>
  <!-- Lime green fill -->
  <text
    class="word"
    x="210" y="96"
    text-anchor="middle"
    fill="#85C130"
  >MyTree</text>
</svg>
